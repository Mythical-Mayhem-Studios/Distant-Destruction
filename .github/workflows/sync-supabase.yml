name: Sync Supabase

on:
  push:
    paths:
      - "supabase/**"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
   
      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_REF_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Wait until DB is stable (poll diff)
        run: |
          for i in {1..10}; do
            echo "Checking diff attempt $i..."

            supabase db diff --linked > diff.txt || true

            if [ ! -s diff.txt ]; then
              echo "DB is stable (no diff)"
              break
            fi

            echo "Diff detected:"
            cat diff.txt

            sleep 5
          done

          # final safety check
          if [ -s diff.txt ]; then
            echo "DB did not stabilize in time"
            exit 1
          fi

      - name: Generate types
        run: |
          mkdir -p src/shared/types

          supabase gen types typescript \
            --project-id ${{ secrets.SUPABASE_REF_ID }} \
            > src/shared/types/supabase.ts

      - name: Commit updated types
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add src/shared/types/supabase.ts

          git commit -m "chore: update supabase types [skip ci]" || exit 0

          git push
