name: Sync Supabase Types

on:
  push:
    paths:
      - "supabase/**"

  workflow_dispatch:

jobs:
  gen-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Generate types
        run: bash scripts/gen-supabase-types.sh

      - name: Check changes
        run: |
          echo "Generated types:"
          ls -la src/shared/types || true
          git diff --exit-code src/shared/types/database.ts || echo "types changed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-types
          path: src/shared/types/database.ts
